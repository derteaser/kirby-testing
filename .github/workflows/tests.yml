name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4', '8.5']
        deps: [prefer-lowest, prefer-stable]

    name: PHP ${{ matrix.php }} / ${{ matrix.deps }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, libxml
          coverage: none

      - name: Resolve dependencies
        run: composer update --${{ matrix.deps }} --no-interaction --no-progress

      - name: Run tests
        run: composer test
